version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: goagri
      POSTGRES_PASSWORD: goagri123
      POSTGRES_DB: vyrs_input_supply
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://goagri:goagri123@db:5432/vyrs_input_supply
    depends_on:
      - db

volumes:
  postgres_data: